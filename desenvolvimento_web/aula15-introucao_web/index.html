<!DOCTYPE html> <!-- Informa ao navegador que este documento usa HTML5 -->
<html lang="pt-BR"> <!-- Marca o inicio da pagina HTML. O atributo lang="pt-br" indicar que o idioma principal é o portugues -->
<head> <!-- Cabeçalho da pagina. Aqui fica configurações e informações que não aparecem no corpo da pagina -->
    <meta charset="UTF-8"> <!-- Define o padrão de caracteres. Permite acentos, ç, emojis e carecteres especiais -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Faz a pagina se adaptar a celulares e computadores -->
    <title>Meu Primeiro Site</title> <!-- Titula da pagina, aparece na aba do navegador -->
</head> 
<!-- Fecha a tag HEAD -->
<body> 
    <!-- Corpo da pagina. Tudo que aparece para o usuario fica aqui! -->
    <h1>Bem vindo ao meu site!</h1>
    <h2>Site para estudo do meu curso de full stack</h2>
    <p>Esta é uma estrutura HTML básica</p>
    <ul> 
        <!-- Lista não ordenada -->
        <li><a href="https://www.w3schools.com/Html/" target="_blank">HTML</a></li> <!-- Item da lista -->
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
    <ol>
        <li>Primeiro Item</li>
        <li>Segundo Item</li>
        <li>Terceiro Item</li>
    </ol>
    <img src="../img/pexels-realtoughcandy-11035371.jpg" alt="Homem segurando a logo do HTML" width="80px">
</body> <!--Fecha a tag BODY -->
</html> <!-- Fecha a tag HTML -->
