<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Aula Flexbox</title>
</head>
<body>
    <header class="cabecalho">
        <h1>Minha Loja</h1>
        
        <nav class="menu">
            <a href="#">Inicio</a>
            <a href="#">Produtos</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <main>
        <section class="cards">

            <div class="produtos">
                <h2>Produto 1</h2>
                <p>Descrição do Produto</p>
                <button>Comprar</button>
            </div>

            <div class="produtos">
                <h2>Produto 2</h2>
                <p>Descrição do Produto</p>
                <button>Comprar</button>
            </div>

            <div class="produtos">
                <h2>Produto 3</h2>
                <p>Descrição do Produto</p>
                <button>Comprar</button>
            </div>

            <div class="produtos">
                <h2>Produto 4</h2>
                <p>Descrição do Produto</p>
                <button>Comprar</button>
            </div>
        </section>
    </main>


    <footer class="rodape">
        <p>&copy; 2026 Minha Loja - Todos os direitos reservados</p>

        <div class="redes-sociais">
            <a href="#"><img src="./img/facebook.png" alt="logo facebook"></a>
            <a href="#"><img src="./img/instagram.png" alt="logo instagram"></a>
        </div>
    </footer>
</body>
</html>

<!--
==================================================================
RESUMO DA AULA: HTML5 SEMÂNTICO E VINCULAÇÃO DE CSS EXTERNO
==================================================================
* Evolução: Criação do arquivo 'style.css' para separar o design 
  da estrutura HTML.
* Semântica: Uso de tags corporativas e limpas (<header>, <nav>, 
  <main>, <section>, <footer>) em vez de lotar a página com <div>.
* Próximo Passo: O HTML já está estruturado com as classes prontas 
  (.cabecalho, .menu, .cards, .produtos) para receber o Flexbox 
  e alinhar os produtos em linha!
==================================================================
